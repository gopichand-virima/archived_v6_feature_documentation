server {
    # Port 8080: required by nginxinc/nginx-unprivileged (non-root user cannot bind <1024).
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable hashed assets (JS, CSS) — long cache
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static assets — long cache
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — never cache so deployments take effect immediately
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy
    # - script-src 'self': Vite bundles everything to /assets/; no inline scripts needed
    # - style-src 'unsafe-inline': Tailwind and Radix UI use inline style attributes
    # - connect-src https:: all API calls must be HTTPS (partial API key exposure mitigation)
    # - frame-ancestors 'none': prevents clickjacking (supersedes X-Frame-Options)
    # - object-src 'none': blocks legacy plugin-based attacks
    # - base-uri 'self': prevents <base href="..."> injection attacks
    # NOTE: HSTS is intentionally absent — TLS terminates upstream at K8s ingress / CDN
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

    # Restrict browser APIs not used by a documentation site
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), display-capture=()" always;
}
